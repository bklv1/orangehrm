name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping OrangeHRM
        run: |
          curl -sf --max-time 30 \
            https://orangehrm-xoq7.onrender.com/web/index.php/auth/login \
            -o /dev/null \
            && echo "OK" \
            || echo "Ping failed (app may be starting up)"
